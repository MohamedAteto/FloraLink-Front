[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to backend (prevents mixed-content blocks)
[[redirects]]
  from = "/api/*"
  to = "http://floralink-api.runasp.net/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes go to index.html (React Router handles them)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
